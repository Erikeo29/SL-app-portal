[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (imports inutilisés, variables non définies)
    "I",   # isort (ordre des imports)
    "UP",  # pyupgrade (syntaxe Python moderne)
]
ignore = [
    "E501",  # line too long (géré par ruff format)
]

[tool.ruff.format]
quote-style = "double"
