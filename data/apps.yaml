apps:
- id: 04a
  name: Modélisation électrochimique - CV et EIS - d'un couple redox sur une électrode
    d'or
  name_en: Electrochemical modelling - CV and EIS of a redox couple on gold electrode
  description: 'Simulation voltammétrie cyclique et EIS d''un couple redox. Equations
    de Nernst-Planck, Butler-Volmer, modèle de Randles. Etude de l''impact de des
    paramètres électrochimiques et de la géométrie de l''électrode. Code : Python.'
  description_en: 'Cyclic voltammetry and EIS simulation of a redox couple. Nernst-Planck,
    Butler-Volmer, Randles model. Study of the impact of electrochemical parameters
    and electrode geometry. Code: Python.'
  url: https://echem-redox-couple.streamlit.app
  abbrev: CV
  category: Modélisation électrochimique
  category_en: Electrochemical modelling
  status: live
- id: 04b
  name: Modélisation électrochimique - CV et EIS - d'une électrode or avec impuretés
    nickel et cuivre
  name_en: Electrochemical modelling - CV and EIS of a gold electrode with nickel
    and copper impurities
  description: 'Modélisation du comportement électrochimique d''une électrode d''or
    avec impuretés Ni et Cu en fonction du pH et de la quantité d''impuretés. Equations
    de Nernst, Butler-Volmer, Langmuir, modèle de Randles. Code : Python.'
  description_en: 'Modelling of the electrochemical behaviour of a gold electrode
    with Ni and Cu impurities as a function of pH and impurity content. Nernst, Butler-Volmer,
    Langmuir equations, Randles model. Code: Python.'
  url: https://echem-gold-electrode.streamlit.app
  abbrev: Au
  category: Modélisation électrochimique
  category_en: Electrochemical modelling
  status: live
- id: '05'
  name: Biosenseurs à aptamères
  name_en: Aptamer-based biosensors
  description: 'Performance d''électrodes modifiées par aptamères (E-AB). Analyse
    du signal méthylène bleu, fenêtres de signal. Code : Python.'
  description_en: 'Performance of aptamer-modified electrodes (E-AB). Methylene blue
    signal analysis, signal windows. Code: Python.'
  url: https://aptamer-v1.streamlit.app
  abbrev: E-AB
  category: Modélisation électrochimique
  category_en: Electrochemical modelling
  status: hidden
- id: '10'
  name: Modélisation de la répartition des épaisseurs d'un dépôt électrolytique
  name_en: Electroplating - thickness distribution modelling
  description: 'Etude de la distribution des épaisseurs en fonction du design du produit
    (géométrie, résistivité) et des paramètres process (densité de courant, conductivité
    du bain, configuration anodique). Modèle de distribution du courant secondaire.
    Equations de Laplace, Butler-Volmer, Faraday. Code : Python.'
  description_en: 'Thickness distribution study as a function of product design (geometry,
    resistivity) and process parameters (current density, bath conductivity, anode
    configuration). Secondary current distribution model. Laplace, Butler-Volmer,
    Faraday equations. Code: Python.'
  url: https://electroplating.streamlit.app
  abbrev: EP
  category: Modélisation électrodéposition
  category_en: Electrodeposition modelling
  status: live
- id: '03'
  name: 'Microfluidique : modélisation de dispense et d''écoulement de liquide dans
    micro-cavité ou micro-canal'
  name_en: 'Microfluidics: modelling of liquid dispensing and flow in micro-cavity
    or micro-channel'
  description: Simulation fluidique pour dispense d'un liquide visqueux. Capillarité
    dans un micro-canal. Modèle Carreau-Yasuda. Méthodes VOF/LBM/SPH (OpenFOAM, C++).
  description_en: Fluid simulation for viscous liquid dispensing. Capillarity in a
